<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AUAUSAVE HOUSE — พื้นที่รวมทุกเรื่องราวของศิลปินที่คุณรัก" />
  <title>AUAUSAVE HOUSE — Artist Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>.archive-visibility{margin:14px 0 20px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:#f8f7f4}.archive-visibility>b{display:block;margin-bottom:10px;font-size:13px}.archive-visibility>div{display:flex;flex-wrap:wrap;gap:8px}.archive-visibility label{cursor:pointer}.archive-visibility input{position:absolute;opacity:0;pointer-events:none}.archive-visibility span{display:block;padding:8px 12px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:12px;font-weight:700}.archive-visibility input:checked+span{background:#191919;border-color:#191919;color:#fff}.archive-card-links{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}.archive-card-links a{display:inline-flex;padding:7px 10px;border-radius:999px;background:#f2eee8;text-decoration:none}</style>
  <style>.artist-filmography{background:#171717;color:#fff}.filmography-head small{color:#d86666;font-size:10px;font-weight:800;letter-spacing:2px}.filmography-head h2{font-size:clamp(42px,6vw,72px);margin:6px 0}.filmography-head p{color:#999}.filmography-years{position:relative;display:flex;gap:0;max-width:760px;margin:42px 0 25px}.filmography-years:before{content:"";position:absolute;left:0;right:0;top:7px;height:2px;background:#555}.filmography-years span{position:relative;z-index:1;display:grid;justify-items:center;gap:8px;flex:1}.filmography-years i{width:14px;height:14px;background:#aaa;border:3px solid #171717;border-radius:50%}.filmography-years b{font-size:13px;color:#aaa}.filmography-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,240px));gap:28px 20px}.filmography-card img,.filmography-placeholder{width:100%;aspect-ratio:3/4;border-radius:9px;object-fit:cover;background:linear-gradient(145deg,#bd6b72,#6c849e)}.filmography-placeholder{display:grid;place-items:center}.filmography-placeholder span{font-size:54px;font-weight:800;color:#fff}.filmography-card>small{display:block;margin-top:13px;color:#999;font-size:10px}.filmography-card h3{font-size:17px;margin:5px 0}.filmography-card p{font-size:11px;line-height:1.6;color:#aaa}.artist-filmography .archive-card-links a{background:#303030;color:#fff}.artist-filmography .empty{color:#aaa}@media(max-width:600px){.filmography-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:22px 12px}.filmography-years{overflow:auto}.filmography-years span{min-width:110px}}</style>
  <style>.timeline-parts{display:grid;gap:6px;margin-top:14px}.timeline-parts>div{display:grid;gap:3px;padding:9px 10px;border-left:2px solid #d86666;background:#242424}.timeline-parts b{font-size:11px}.timeline-parts span{font-size:9px;color:#aaa}.timeline-parts a{font-size:9px;color:#efb4a8}.timeline-admin-filter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px}.timeline-admin-filter button{border:1px solid var(--line);background:#fff;padding:9px 14px;border-radius:99px}.timeline-admin-filter button.active{background:#191919;color:#fff}.timeline-admin-list{display:grid;gap:10px}.timeline-admin-list article{display:grid;grid-template-columns:80px 1fr auto;align-items:center;gap:15px;padding:12px;border:1px solid var(--line);border-radius:13px}.timeline-admin-list img,.timeline-admin-noimage{width:80px;height:105px;border-radius:8px;object-fit:cover}.timeline-admin-noimage{display:grid;place-items:center;background:#eee9e1;font-size:9px}.timeline-admin-list h3{margin:4px 0}.timeline-admin-list p{margin:0 0 5px;color:var(--muted);font-size:11px}.timeline-admin-list small,.timeline-admin-list span{font-size:9px;color:var(--muted)}@media(max-width:700px){.timeline-admin-list article{grid-template-columns:60px 1fr}.timeline-admin-list img,.timeline-admin-noimage{width:60px;height:80px}.timeline-admin-list .actions{grid-column:2}}</style>
  <style>.timeline-note{margin-top:12px;padding:9px 11px;border-left:3px solid #d86666;background:#292929;color:#ddd;font-size:10px;line-height:1.5}.timeline-admin-note{display:inline-block;margin-top:6px;padding:6px 9px;border-radius:7px;background:#fff3cf;color:#705b1a;font-size:10px}</style>
  <style>.filmography-timeline{position:relative;display:grid;grid-auto-flow:column;grid-auto-columns:minmax(190px,240px);gap:20px;overflow-x:auto;padding:40px 0 12px}.filmography-timeline:before{content:"";position:absolute;left:0;right:0;top:47px;height:2px;background:#555}.filmography-year-column{position:relative;z-index:1;min-width:0}.filmography-year-column>header{display:grid;justify-items:center;gap:8px;margin-bottom:14px}.filmography-year-column>header i{width:14px;height:14px;border:3px solid #171717;border-radius:50%;background:#aaa}.filmography-year-column>header b{font-size:13px;color:#aaa}.filmography-year-column>div{display:grid;gap:22px}.filmography-year-column .filmography-card{width:100%}@media(max-width:600px){.filmography-timeline{grid-auto-columns:minmax(165px,72vw);gap:14px}}</style>
  <style>.filmography-timeline{display:flex;align-items:flex-start;gap:70px}.filmography-year-group{position:relative;z-index:1;flex:none}.filmography-year-group>header{display:grid;justify-items:center;gap:8px;margin-bottom:14px}.filmography-year-group>header i{width:14px;height:14px;border:3px solid #171717;border-radius:50%;background:#aaa}.filmography-year-group>header b{font-size:13px;color:#aaa}.filmography-year-cards{display:flex;align-items:flex-start;gap:20px}.filmography-year-cards .filmography-card{width:220px;flex:none}@media(max-width:600px){.filmography-timeline{gap:46px}.filmography-year-cards{gap:12px}.filmography-year-cards .filmography-card{width:min(72vw,190px)}}</style>
  <style>.filmography-card>p{white-space:pre-line}</style>
  <style>.timeline-subsection{margin-top:55px}.timeline-subsection+.timeline-subsection{padding-top:42px;border-top:1px solid #333}.timeline-subsection-head{display:flex;align-items:end;justify-content:space-between;margin-bottom:-20px}.timeline-subsection-head h3{margin:0;font-size:30px}.timeline-subsection-head span{font-size:10px;color:#888}.timeline-subsection.is-upcoming{padding:28px;border-radius:20px;background:#242424}.timeline-subsection.is-upcoming .timeline-subsection-head h3{color:#efb4a8}.timeline-upcoming-field{align-self:end;padding-bottom:10px}.timeline-upcoming-field label{display:flex;align-items:center;gap:8px;font-size:12px}.timeline-upcoming-field input{width:17px;height:17px;accent-color:#d86666}</style>
  <style>.timeline-tab-heading{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.timeline-tab-heading h2{margin:3px 0}.timeline-visibility-switch{cursor:pointer}.timeline-visibility-switch input{position:absolute;opacity:0}.timeline-visibility-switch span{display:block;padding:9px 13px;border-radius:999px;background:#dedbd4;color:#777;font-size:11px;font-weight:700}.timeline-visibility-switch input:checked+span{background:#191919;color:#fff}.award-image{display:block;width:100%;height:auto;aspect-ratio:3/2;object-fit:cover;object-position:center;border-radius:12px;margin-bottom:15px}.archive-award-row .award-image{width:54px;height:54px;aspect-ratio:1;margin:0 8px 0 0;display:inline-block;vertical-align:middle}</style>
  <style>.award-image{aspect-ratio:2/3}</style>
</head>

  <div id="app"></div>
  <div id="toast" class="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-db.js"></script>
  <script src="imported-events.js"></script>
  <script src="app.js"></script>
</body>
</html>
